# Standalone compose — ใช้รัน python-ai แบบ dev อิสระ (ไม่ผ่าน chatappandpython)
# สำหรับ production ให้ใช้ ../chatappandpython/docker-compose.yml แทน

services:
  app:
    build: .
    container_name: python-ai-standalone
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - MINIO_ENDPOINT=minio
      - DB_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: python-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-accident_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-accident_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: python-ai-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
