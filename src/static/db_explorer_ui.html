<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musya — Database Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'IBM Plex Sans Thai', sans-serif; }
    code, .mono { font-family: 'IBM Plex Mono', monospace; }
    .sidebar-item { cursor: pointer; transition: background 0.15s; }
    .sidebar-item:hover { background: #e0e7ff; }
    .sidebar-item.active { background: #6366f1; color: white; }
    .sidebar-item.active .badge { background: rgba(255,255,255,0.25); color: white; }
    .badge { background: #e0e7ff; color: #4338ca; font-size: 0.7rem; padding: 1px 6px; border-radius: 9999px; font-weight: 600; }
    .grid-table { border-collapse: collapse; width: max-content; min-width: 100%; font-size: 0.8rem; }
    .grid-table th { background: #f1f5f9; position: sticky; top: 0; z-index: 1; border-bottom: 2px solid #e2e8f0; padding: 6px 10px; text-align: left; white-space: nowrap; cursor: pointer; user-select: none; min-width: 80px; }
    .grid-table th:hover { background: #e0e7ff; }
    .grid-table td { border-bottom: 1px solid #f1f5f9; padding: 5px 10px; max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: top; }
    .grid-table td.expand { white-space: normal; word-break: break-all; max-width: 360px; }
    .grid-table tr:hover td { background: #f8fafc; }
    .col-type { font-size: 0.65rem; color: #94a3b8; font-weight: 400; display: block; }
    .top-scroll-bar { overflow-x: auto; overflow-y: hidden; height: 12px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; }
    .top-scroll-bar-inner { height: 1px; }
    .schema-pill { display: inline-block; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 4px; padding: 1px 6px; font-size: 0.7rem; color: #475569; margin: 1px; font-family: 'IBM Plex Mono', monospace; white-space: nowrap; }
    .null-val { color: #94a3b8; font-style: italic; }
    .vec-val { color: #8b5cf6; font-size: 0.7rem; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<!-- Header -->
<header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
  <div class="px-4 h-14 flex items-center gap-3">
    <div class="w-8 h-8 rounded bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold shadow-sm select-none">M</div>
    <div>
      <h1 class="text-base font-bold text-gray-900 leading-tight">Database Explorer</h1>
      <p class="text-xs text-gray-400">chat-aio · PostgreSQL</p>
    </div>
    <div class="ml-auto flex items-center gap-2 text-xs text-gray-500">
      <span id="hdr-status"></span>
      <a href="/docs" target="_blank" class="text-indigo-500 hover:underline">Swagger</a>
      <a href="/test" target="_blank" class="text-indigo-500 hover:underline">Test UI</a>
    </div>
  </div>
</header>

<!-- Body: sidebar + main -->
<div class="flex flex-1 overflow-hidden" style="height: calc(100vh - 56px)">

  <!-- Sidebar -->
  <aside class="w-56 bg-white border-r border-gray-200 flex flex-col flex-shrink-0 overflow-hidden">
    <div class="px-3 pt-3 pb-1">
      <input id="sidebar-search" type="search" placeholder="Filter tables…"
             class="w-full text-xs border border-gray-200 rounded px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-300">
    </div>
    <div id="sidebar-list" class="flex-1 overflow-y-auto py-1">
      <div class="text-xs text-gray-400 px-4 py-6 text-center">Loading…</div>
    </div>
    <div class="px-3 py-2 border-t border-gray-100 text-xs text-gray-400 tabular-nums" id="sidebar-footer"></div>
  </aside>

  <!-- Main panel -->
  <main class="flex-1 flex flex-col overflow-hidden bg-gray-50">

    <!-- Empty state -->
    <div id="empty-state" class="flex-1 flex flex-col items-center justify-center text-gray-400 gap-3">
      <svg class="w-14 h-14 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M4 7h16M4 12h16M4 17h7"/>
      </svg>
      <p class="text-sm">Select a table from the sidebar</p>
    </div>

    <!-- Data panel (hidden until table selected) -->
    <div id="data-panel" class="hidden flex-1 flex flex-col overflow-hidden">

      <!-- Toolbar -->
      <div class="bg-white border-b border-gray-200 px-4 py-2 flex flex-wrap items-center gap-2">
        <h2 class="text-sm font-semibold text-gray-800 mono" id="panel-title">—</h2>
        <span class="text-xs text-gray-400" id="panel-meta"></span>
        <div class="ml-auto flex items-center gap-2 flex-wrap">
          <!-- Filter -->
          <select id="filter-col" class="text-xs border border-gray-200 rounded px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
            <option value="">— column —</option>
          </select>
          <input id="filter-val" type="text" placeholder="value…"
                 class="text-xs border border-gray-200 rounded px-2 py-1.5 w-36 focus:outline-none focus:ring-2 focus:ring-indigo-300">
          <button id="btn-apply" onclick="applyFilter()"
                  class="text-xs bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded font-medium">Apply</button>
          <button id="btn-clear" onclick="clearFilter()"
                  class="text-xs bg-white hover:bg-gray-100 text-gray-600 border border-gray-200 px-3 py-1.5 rounded font-medium">Clear</button>
        </div>
      </div>

      <!-- Schema bar (column list) -->
      <div id="schema-bar" class="hidden bg-indigo-50 border-b border-indigo-100 px-4 py-2 overflow-x-auto">
        <div class="flex items-center gap-1 flex-wrap">
          <span class="text-xs font-semibold text-indigo-400 mr-1 flex-shrink-0">Columns:</span>
          <div id="schema-pills"></div>
        </div>
      </div>

      <!-- Top mirror scrollbar -->
      <div class="top-scroll-bar" id="top-scroll">
        <div class="top-scroll-bar-inner" id="top-scroll-inner"></div>
      </div>

      <!-- Table scroll area -->
      <div class="flex-1 overflow-auto" id="table-scroll">
        <div id="loading-row" class="hidden px-6 py-8 text-center text-sm text-gray-400">
          <svg class="spinner inline w-5 h-5 text-indigo-400 mr-2" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
          Loading…
        </div>
        <div id="error-row" class="hidden px-6 py-4 text-sm text-red-500 bg-red-50 border-b border-red-100"></div>
        <table class="grid-table" id="data-table">
          <thead id="data-thead"></thead>
          <tbody id="data-tbody"></tbody>
        </table>
      </div>

      <!-- Pagination bar -->
      <div class="bg-white border-t border-gray-200 px-4 py-2 flex items-center gap-3 text-xs text-gray-600">
        <button id="btn-prev" onclick="goPage(-1)"
                class="px-3 py-1 rounded border border-gray-200 hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed font-medium">← Prev</button>
        <span id="page-info" class="tabular-nums"></span>
        <button id="btn-next" onclick="goPage(1)"
                class="px-3 py-1 rounded border border-gray-200 hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed font-medium">Next →</button>
        <span class="ml-auto text-gray-400" id="total-info"></span>
        <select id="page-size-sel" onchange="changePageSize(this.value)"
                class="text-xs border border-gray-200 rounded px-2 py-1 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
          <option value="20">20 / page</option>
          <option value="50" selected>50 / page</option>
          <option value="100">100 / page</option>
          <option value="200">200 / page</option>
        </select>
      </div>
    </div>
  </main>
</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let state = {
  table: null,
  columns: [],
  page: 1,
  pageSize: 50,
  filterCol: '',
  filterVal: '',
  total: 0,
};

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
document.addEventListener('DOMContentLoaded', () => {
  loadSidebar();
  document.getElementById('sidebar-search').addEventListener('input', e => {
    filterSidebar(e.target.value.toLowerCase());
  });
  document.getElementById('filter-val').addEventListener('keydown', e => {
    if (e.key === 'Enter') applyFilter();
  });
  // Sync top ↔ bottom horizontal scrollbar
  const topScroll = document.getElementById('top-scroll');
  const tableScroll = document.getElementById('table-scroll');
  let syncingTop = false, syncingBottom = false;
  topScroll.addEventListener('scroll', () => {
    if (syncingBottom) return;
    syncingTop = true;
    tableScroll.scrollLeft = topScroll.scrollLeft;
    syncingTop = false;
  });
  tableScroll.addEventListener('scroll', () => {
    if (syncingTop) return;
    syncingBottom = true;
    topScroll.scrollLeft = tableScroll.scrollLeft;
    document.getElementById('top-scroll-inner').style.width =
      document.getElementById('data-table').scrollWidth + 'px';
    syncingBottom = false;
  });
});

// ---------------------------------------------------------------------------
// Sidebar
// ---------------------------------------------------------------------------
async function loadSidebar() {
  try {
    const res = await fetch('/api/db/tables');
    const data = await res.json();
    renderSidebar(data.tables);
    document.getElementById('sidebar-footer').textContent = `${data.tables.length} tables`;
    document.getElementById('hdr-status').textContent = `${data.tables.length} tables`;
  } catch (e) {
    document.getElementById('sidebar-list').innerHTML =
      `<div class="text-xs text-red-500 px-4 py-4">Failed to load tables</div>`;
  }
}

function renderSidebar(tables) {
  const list = document.getElementById('sidebar-list');
  list.innerHTML = tables.map(t => `
    <div class="sidebar-item flex items-center justify-between px-3 py-2 rounded mx-1 mb-0.5 text-sm"
         data-name="${t.name}" onclick="selectTable('${t.name}')">
      <span class="truncate mono text-xs font-medium text-gray-700">${t.name}</span>
      <span class="badge ml-1 flex-shrink-0">${fmt(t.row_count)}</span>
    </div>
  `).join('');
}

function filterSidebar(q) {
  document.querySelectorAll('#sidebar-list .sidebar-item').forEach(el => {
    const match = !q || el.dataset.name.includes(q);
    el.style.display = match ? '' : 'none';
  });
}

function setActiveSidebarItem(name) {
  document.querySelectorAll('#sidebar-list .sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.name === name);
  });
}

// ---------------------------------------------------------------------------
// Select table
// ---------------------------------------------------------------------------
async function selectTable(name) {
  state.table = name;
  state.page = 1;
  state.filterCol = '';
  state.filterVal = '';

  setActiveSidebarItem(name);
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('data-panel').classList.remove('hidden');
  document.getElementById('panel-title').textContent = name;
  document.getElementById('filter-col').innerHTML = '<option value="">— column —</option>';
  document.getElementById('filter-val').value = '';

  await loadColumns(name);
  await loadRows();
}

async function loadColumns(name) {
  try {
    const res = await fetch(`/api/db/tables/${encodeURIComponent(name)}/columns`);
    const data = await res.json();
    state.columns = data.columns;
    // Filter dropdown
    const sel = document.getElementById('filter-col');
    data.columns.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.name;
      opt.textContent = `${c.name} (${c.data_type})`;
      sel.appendChild(opt);
    });
    // Schema bar
    const pills = document.getElementById('schema-pills');
    pills.innerHTML = data.columns.map(c =>
      `<span class="schema-pill" title="${escHtml(c.data_type)}">${escHtml(c.name)}<span style="color:#94a3b8"> ${escHtml(shortType(c.data_type))}</span></span>`
    ).join('');
    document.getElementById('schema-bar').classList.remove('hidden');
  } catch (e) {
    console.error('Failed to load columns', e);
  }
}

function shortType(t) {
  const m = {
    'character varying': 'varchar', 'timestamp without time zone': 'timestamp',
    'timestamp with time zone': 'timestamptz', 'double precision': 'float8',
    'integer': 'int', 'bigint': 'bigint', 'boolean': 'bool',
    'text': 'text', 'numeric': 'numeric', 'jsonb': 'jsonb', 'json': 'json',
  };
  return m[t] || t.split('(')[0].slice(0, 10);
}

// ---------------------------------------------------------------------------
// Load rows
// ---------------------------------------------------------------------------
async function loadRows() {
  const { table, page, pageSize, filterCol, filterVal } = state;
  setLoading(true);
  clearError();

  const params = new URLSearchParams({ page, page_size: pageSize });
  if (filterCol && filterVal !== '') {
    params.set('filter_col', filterCol);
    params.set('filter_val', filterVal);
  }

  try {
    const res = await fetch(`/api/db/tables/${encodeURIComponent(table)}/rows?${params}`);
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || res.statusText);
    }
    const data = await res.json();
    state.total = data.total;
    state.page = data.page;
    state.pageSize = data.page_size;
    renderGrid(data.rows, state.columns);
    updatePagination();
  } catch (e) {
    showError(e.message);
  } finally {
    setLoading(false);
  }
}

// ---------------------------------------------------------------------------
// Render grid
// ---------------------------------------------------------------------------
function renderGrid(rows, columns) {
  const thead = document.getElementById('data-thead');
  const tbody = document.getElementById('data-tbody');

  if (rows.length === 0) {
    thead.innerHTML = '';
    tbody.innerHTML = `<tr><td colspan="99" class="px-4 py-8 text-center text-gray-400 text-sm">No rows found</td></tr>`;
    syncTopScrollbar();
    return;
  }

  // Use server column order if available, otherwise derive from first row
  const colNames = columns.length ? columns.map(c => c.name) : Object.keys(rows[0]);
  const colTypeMap = {};
  columns.forEach(c => colTypeMap[c.name] = shortType(c.data_type));

  thead.innerHTML = `<tr>${colNames.map(c => {
    const t = colTypeMap[c] || '';
    return `<th onclick="setFilterCol('${escHtml(c)}')" title="Click to filter · type: ${t}">${escHtml(c)}<span class="col-type">${t}</span></th>`;
  }).join('')}</tr>`;

  tbody.innerHTML = rows.map(row =>
    `<tr>${colNames.map(c => {
      const v = row[c];
      if (v === null || v === undefined) return `<td><span class="null-val">NULL</span></td>`;
      const s = String(v);
      if (s === '[…vector…]') return `<td><span class="vec-val">[…vector…]</span></td>`;
      const display = s.length > 140 ? s.slice(0, 140) + '…' : s;
      return `<td title="${escHtml(s)}" ondblclick="this.classList.toggle('expand')">${escHtml(display)}</td>`;
    }).join('')}</tr>`
  ).join('');

  syncTopScrollbar();
}

function syncTopScrollbar() {
  const table = document.getElementById('data-table');
  const topScroll = document.getElementById('top-scroll');
  const inner = document.getElementById('top-scroll-inner');
  // Set inner width to match table scroll width
  requestAnimationFrame(() => {
    inner.style.width = table.scrollWidth + 'px';
  });
}


// ---------------------------------------------------------------------------
// Pagination
// ---------------------------------------------------------------------------
function updatePagination() {
  const { page, pageSize, total } = state;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  const start = (page - 1) * pageSize + 1;
  const end = Math.min(page * pageSize, total);

  document.getElementById('page-info').textContent = `Page ${page} of ${totalPages}`;
  document.getElementById('total-info').textContent = total > 0
    ? `Rows ${fmt(start)}–${fmt(end)} of ${fmt(total)}`
    : '0 rows';
  document.getElementById('panel-meta').textContent =
    state.filterCol ? `filtered by ${state.filterCol} = "${state.filterVal}"` : '';

  document.getElementById('btn-prev').disabled = page <= 1;
  document.getElementById('btn-next').disabled = page >= totalPages;
}

function goPage(delta) {
  const totalPages = Math.ceil(state.total / state.pageSize);
  const next = state.page + delta;
  if (next < 1 || next > totalPages) return;
  state.page = next;
  loadRows();
}

function changePageSize(val) {
  state.pageSize = parseInt(val, 10);
  state.page = 1;
  loadRows();
}

// ---------------------------------------------------------------------------
// Filter
// ---------------------------------------------------------------------------
function setFilterCol(col) {
  document.getElementById('filter-col').value = col;
}

function applyFilter() {
  state.filterCol = document.getElementById('filter-col').value;
  state.filterVal = document.getElementById('filter-val').value;
  state.page = 1;
  loadRows();
}

function clearFilter() {
  state.filterCol = '';
  state.filterVal = '';
  document.getElementById('filter-col').value = '';
  document.getElementById('filter-val').value = '';
  state.page = 1;
  loadRows();
}

// ---------------------------------------------------------------------------
// UI helpers
// ---------------------------------------------------------------------------
function setLoading(on) {
  document.getElementById('loading-row').classList.toggle('hidden', !on);
  document.getElementById('data-table').classList.toggle('hidden', on);
}

function showError(msg) {
  const el = document.getElementById('error-row');
  el.textContent = `Error: ${msg}`;
  el.classList.remove('hidden');
}

function clearError() {
  document.getElementById('error-row').classList.add('hidden');
}

function fmt(n) {
  return Number(n).toLocaleString();
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
