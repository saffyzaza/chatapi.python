<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zone 10 Accident Policy — เขตสุขภาพที่ 10</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'IBM Plex Sans Thai', sans-serif; }
    .tab-btn.active { border-bottom: 2px solid #4f46e5; color: #4f46e5; font-weight: 600; }
    .spinner { border: 3px solid #e5e7eb; border-top-color: #4f46e5; border-radius: 50%; width: 1.5rem; height: 1.5rem; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    pre { white-space: pre-wrap; word-break: break-word; font-family: 'IBM Plex Sans Thai', sans-serif; font-size: 0.82rem; }
    .prose h3 { font-size: 1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.25rem; color: #1e1b4b; }
    .prose h2 { font-size: 1.1rem; font-weight: 700; margin-top: 1.25rem; margin-bottom: 0.5rem; color: #1e1b4b; border-bottom: 1px solid #e0e7ff; padding-bottom: 0.25rem; }
    .prose table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin: 0.5rem 0 1rem; }
    .prose th { background: #e0e7ff; padding: 0.4rem 0.75rem; text-align: left; font-weight: 600; }
    .prose td { border: 1px solid #e5e7eb; padding: 0.35rem 0.75rem; }
    .prose strong { font-weight: 600; color: #312e81; }
    .prose ul { list-style: disc; padding-left: 1.5rem; margin: 0.25rem 0; }
    .prose li { margin-bottom: 0.15rem; }
    .data-section { border-left: 3px solid #4f46e5; padding-left: 0.75rem; margin-bottom: 1rem; }
    .data-label { font-size: 0.7rem; font-weight: 600; color: #6366f1; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-indigo-700 text-white px-6 py-4 shadow-md">
  <div class="max-w-7xl mx-auto flex items-center justify-between">
    <div>
      <h1 class="text-xl font-semibold">นโยบายอุบัติเหตุทางถนน — เขตสุขภาพที่ 10</h1>
      <p class="text-indigo-200 text-sm mt-0.5">อุบลราชธานี · ศรีสะเกษ · ยโสธร · อำนาจเจริญ · มุกดาหาร</p>
    </div>
    <span class="text-indigo-300 text-xs">สำหรับ สสส./สสจ./ศปถ.</span>
  </div>
</header>

<div class="max-w-7xl mx-auto px-4 py-6 flex gap-6">

  <!-- Left Panel: Controls -->
  <aside class="w-72 flex-shrink-0">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 sticky top-4">
      <h2 class="font-semibold text-gray-800 mb-4">ตั้งค่าการวิเคราะห์</h2>

      <!-- Province Checkboxes -->
      <div class="mb-5">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2 block">จังหวัดเป้าหมาย</label>
        <div id="province-list" class="space-y-1.5">
          <!-- Filled by JS -->
        </div>
        <div class="mt-2 flex gap-2">
          <button onclick="selectAll(true)" class="text-xs text-indigo-600 hover:underline">เลือกทั้งหมด</button>
          <span class="text-gray-300">|</span>
          <button onclick="selectAll(false)" class="text-xs text-indigo-600 hover:underline">ยกเลิก</button>
        </div>
      </div>

      <!-- Year Range -->
      <div class="mb-5">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2 block">ช่วงปี (CE)</label>
        <div class="flex gap-2 items-center">
          <input id="year-start" type="number" value="2021" min="2021" max="2026"
            class="w-20 border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-400" />
          <span class="text-gray-400 text-sm">–</span>
          <input id="year-end" type="number" value="2026" min="2021" max="2026"
            class="w-20 border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-400" />
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="space-y-2">
        <button id="btn-preview" onclick="fetchData()" class="w-full bg-indigo-100 hover:bg-indigo-200 text-indigo-800 font-medium py-2 px-4 rounded-lg text-sm transition">
          🔍 ดูข้อมูล (ไม่ใช้ AI)
        </button>
        <button id="btn-analyze" onclick="runAnalysis()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg text-sm transition">
          🤖 สร้างรายงานนโยบาย (AI)
        </button>
      </div>

      <!-- Status -->
      <div id="status-box" class="hidden mt-4 text-sm text-gray-600 bg-indigo-50 rounded-lg p-3 flex items-center gap-2">
        <div class="spinner flex-shrink-0"></div>
        <span id="status-text">กำลังดึงข้อมูล...</span>
      </div>
      <div id="error-box" class="hidden mt-4 text-sm text-red-700 bg-red-50 rounded-lg p-3"></div>

      <!-- Copy button (shown after analysis) -->
      <button id="btn-copy" onclick="copyReport()" class="hidden mt-3 w-full text-gray-600 hover:text-indigo-700 text-xs border border-gray-200 rounded py-1.5 transition">
        📋 คัดลอก Markdown
      </button>
    </div>
  </aside>

  <!-- Right Panel: Results -->
  <main class="flex-1 min-w-0">

    <!-- Category Tabs -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div id="tab-bar" class="flex border-b border-gray-200 px-4 overflow-x-auto">
        <button class="tab-btn active px-5 py-3 text-sm text-gray-600 whitespace-nowrap" onclick="showTab('all')" data-tab="all">ภาพรวม</button>
        <button class="tab-btn px-5 py-3 text-sm text-gray-600 whitespace-nowrap" onclick="showTab('hotspot')" data-tab="hotspot">🔴 Hotspot (Q1-Q2)</button>
        <button class="tab-btn px-5 py-3 text-sm text-gray-600 whitespace-nowrap" onclick="showTab('behavior')" data-tab="behavior">👤 พฤติกรรม (Q3-Q4)</button>
        <button class="tab-btn px-5 py-3 text-sm text-gray-600 whitespace-nowrap" onclick="showTab('environment')" data-tab="environment">🌧 สิ่งแวดล้อม (Q5)</button>
        <button class="tab-btn px-5 py-3 text-sm text-gray-600 whitespace-nowrap" onclick="showTab('kpi')" data-tab="kpi">📊 KPI (Q6-Q7)</button>
      </div>

      <!-- Tab Content -->
      <div id="tab-content" class="p-5">
        <!-- Placeholder -->
        <div id="placeholder" class="text-center text-gray-400 py-16">
          <div class="text-4xl mb-3">📋</div>
          <p class="text-base font-medium text-gray-500">เลือกจังหวัด แล้วกด "ดูข้อมูล" หรือ "สร้างรายงาน"</p>
          <p class="text-sm mt-1">ข้อมูลอุบัติเหตุ ปี 2021–2026 จากฐานข้อมูล PostgreSQL</p>
        </div>

        <!-- Data sections (shown after Preview) -->
        <div id="data-view" class="hidden space-y-4"></div>

        <!-- AI Report (shown after Analysis) -->
        <div id="report-view" class="hidden"></div>
      </div>
    </div>

    <!-- Chart area -->
    <div id="chart-area" class="hidden mt-4 grid grid-cols-1 gap-4">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
        <h3 class="text-sm font-semibold text-gray-700 mb-3" id="chart-title">แผนภูมิ</h3>
        <canvas id="main-chart" height="80"></canvas>
      </div>
    </div>
  </main>
</div>

<script>
const PROVINCES = ["อุบลราชธานี", "ศรีสะเกษ", "ยโสธร", "อำนาจเจริญ", "มุกดาหาร"];
const QUESTION_LABELS = {
  Q1_hotspot_roads:       { tab: "hotspot",      label: "Q1 — ถนนเสี่ยงสูงสุด (Top 10)" },
  Q2_time_bands:          { tab: "hotspot",      label: "Q2 — ช่วงเวลาอันตราย (EMS)" },
  Q3_motorcycle_severity: { tab: "behavior",     label: "Q3 — อุบัติเหตุจักรยานยนต์แยกความรุนแรง" },
  Q4_car_injuries:        { tab: "behavior",     label: "Q4 — อุบัติเหตุรถยนต์/บาดเจ็บสาหัส" },
  Q5_environment_risk:    { tab: "environment",  label: "Q5 — สภาพแสง/ถนน vs. ความรุนแรง" },
  Q6_yearly_kpi:          { tab: "kpi",          label: "Q6 — แนวโน้มรายปี (KPI)" },
  Q7_monthly_risk:        { tab: "kpi",          label: "Q7 — ความเสี่ยงรายเดือน/เทศกาล" },
};

let activeTab = "all";
let currentReport = "";
let currentData = null;

// ── Province checkboxes ──────────────────────────────────────────────────────
(function buildProvinceList() {
  const list = document.getElementById("province-list");
  PROVINCES.forEach(p => {
    const id = `prov-${p}`;
    list.insertAdjacentHTML("beforeend", `
      <label class="flex items-center gap-2 cursor-pointer group">
        <input type="checkbox" id="${id}" value="${p}" checked
          class="accent-indigo-600 w-4 h-4 cursor-pointer" />
        <span class="text-sm text-gray-700 group-hover:text-indigo-700">${p}</span>
      </label>
    `);
  });
})();

function selectAll(checked) {
  document.querySelectorAll("#province-list input").forEach(cb => cb.checked = checked);
}

function getSelectedProvinces() {
  return [...document.querySelectorAll("#province-list input:checked")].map(cb => cb.value);
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
function showTab(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.tab === tab);
  });
  renderCurrentView();
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setStatus(msg) {
  const box = document.getElementById("status-box");
  box.classList.remove("hidden");
  document.getElementById("status-text").textContent = msg;
  document.getElementById("error-box").classList.add("hidden");
}
function clearStatus() {
  document.getElementById("status-box").classList.add("hidden");
}
function showError(msg) {
  clearStatus();
  const box = document.getElementById("error-box");
  box.textContent = "❌ " + msg;
  box.classList.remove("hidden");
}
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function setButtons(disabled) {
  document.getElementById("btn-preview").disabled = disabled;
  document.getElementById("btn-analyze").disabled = disabled;
}

// ── Fetch Data (no LLM) ───────────────────────────────────────────────────────
async function fetchData() {
  const provinces = getSelectedProvinces();
  if (!provinces.length) { showError("กรุณาเลือกอย่างน้อย 1 จังหวัด"); return; }
  setStatus("กำลังดึงข้อมูลจากฐานข้อมูล...");
  setButtons(true);
  document.getElementById("placeholder").classList.add("hidden");
  document.getElementById("data-view").classList.add("hidden");
  document.getElementById("report-view").classList.add("hidden");

  try {
    const qs = encodeURIComponent(provinces.join(","));
    const resp = await fetch(`/api/accident-policy/zone10/data?provinces=${qs}`);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail?.message || `HTTP ${resp.status}`);
    }
    currentData = await resp.json();
    clearStatus();
    renderDataView();
  } catch(e) {
    showError(e.message);
  } finally {
    setButtons(false);
  }
}

function renderDataView() {
  const container = document.getElementById("data-view");
  container.innerHTML = "";

  const questions = currentData?.questions || {};
  for (const [key, text] of Object.entries(questions)) {
    const info = QUESTION_LABELS[key] || { tab: "all", label: key };
    const div = document.createElement("div");
    div.className = "data-section";
    div.dataset.qtab = info.tab;
    div.innerHTML = `<div class="data-label">${escHtml(info.label)}</div><pre class="text-gray-700">${escHtml(text)}</pre>`;
    container.appendChild(div);
  }
  container.classList.remove("hidden");
  document.getElementById("report-view").classList.add("hidden");
  renderCurrentView();
}

function renderCurrentView() {
  const dataView = document.getElementById("data-view");
  const reportView = document.getElementById("report-view");
  const isDataMode = !dataView.classList.contains("hidden") || !reportView.classList.contains("hidden");
  if (!isDataMode) return;

  if (!dataView.classList.contains("hidden")) {
    // Filter data sections by tab
    dataView.querySelectorAll(".data-section").forEach(el => {
      const qtab = el.dataset.qtab;
      el.style.display = (activeTab === "all" || qtab === activeTab) ? "" : "none";
    });
  }
}

// ── Run Analysis (LLM) ────────────────────────────────────────────────────────
async function runAnalysis() {
  const provinces = getSelectedProvinces();
  if (!provinces.length) { showError("กรุณาเลือกอย่างน้อย 1 จังหวัด"); return; }
  const yearStart = parseInt(document.getElementById("year-start").value);
  const yearEnd = parseInt(document.getElementById("year-end").value);
  if (yearStart > yearEnd) { showError("ปีเริ่มต้นต้องน้อยกว่าหรือเท่ากับปีสิ้นสุด"); return; }

  setStatus("กำลังวิเคราะห์ด้วย AI (ใช้เวลา 2–5 นาที)...");
  setButtons(true);
  document.getElementById("placeholder").classList.add("hidden");
  document.getElementById("data-view").classList.add("hidden");
  document.getElementById("report-view").classList.add("hidden");
  document.getElementById("btn-copy").classList.add("hidden");

  try {
    const resp = await fetch("/api/accident-policy/zone10", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        provinces,
        questions: ["all"],
        year_range: [yearStart, yearEnd],
        format: "markdown",
      }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail?.message || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    currentReport = data.policy_brief || "";
    clearStatus();
    renderReportView(data);
    renderCharts(data.charts || []);
  } catch(e) {
    showError(e.message);
  } finally {
    setButtons(false);
  }
}

function renderReportView(data) {
  const container = document.getElementById("report-view");
  container.innerHTML = `<div class="prose">${markdownToHtml(data.policy_brief || "ไม่พบข้อมูล")}</div>`;
  container.classList.remove("hidden");
  document.getElementById("btn-copy").classList.remove("hidden");
}

function renderCharts(charts) {
  if (!charts || !charts.length) {
    document.getElementById("chart-area").classList.add("hidden");
    return;
  }
  document.getElementById("chart-area").classList.remove("hidden");
  // Render first chart
  const spec = charts[0];
  document.getElementById("chart-title").textContent = spec.title || "แผนภูมิ";
  const ctx = document.getElementById("main-chart").getContext("2d");
  if (window._chart) window._chart.destroy();
  window._chart = new Chart(ctx, {
    type: spec.type || "bar",
    data: spec.data || { labels: [], datasets: [] },
    options: {
      responsive: true,
      plugins: { legend: { position: "top" } },
    },
  });
}

function copyReport() {
  if (!currentReport) return;
  navigator.clipboard.writeText(currentReport).then(() => {
    const btn = document.getElementById("btn-copy");
    btn.textContent = "✅ คัดลอกแล้ว";
    setTimeout(() => { btn.textContent = "📋 คัดลอก Markdown"; }, 2000);
  });
}

// ── Minimal Markdown → HTML ──────────────────────────────────────────────────
function markdownToHtml(md) {
  let html = escHtml(md);
  // Headers
  html = html.replace(/^### (.+)$/gm, "<h3>$1</h3>");
  html = html.replace(/^## (.+)$/gm, "<h2>$1</h2>");
  html = html.replace(/^# (.+)$/gm, "<h2>$1</h2>");
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  // Table rows
  html = html.replace(/^\|(.+)\|$/gm, (line) => {
    const cells = line.split("|").slice(1, -1).map(c => c.trim());
    if (cells.every(c => /^[-:]+$/.test(c))) return ""; // separator row
    const tag = cells.length > 0 && cells[0].includes("---") ? "th" : "td";
    return "<tr>" + cells.map(c => `<${tag}>${c}</${tag}>`).join("") + "</tr>";
  });
  html = html.replace(/(<tr>.*<\/tr>(\n|$))+/g, m => `<table>${m}</table>`);
  // Lists
  html = html.replace(/^- (.+)$/gm, "<li>$1</li>");
  html = html.replace(/(<li>.*<\/li>(\n|$))+/g, m => `<ul>${m}</ul>`);
  // Paragraphs
  html = html.replace(/\n{2,}/g, "</p><p>");
  return `<p>${html}</p>`;
}
</script>
</body>
</html>
